name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Mismo compose que local: PostgreSQL real, nunca H2/TestContainers (regla del proyecto).
      - name: Levantar PostgreSQL de test
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Tests + build (mvnw verify)
        run: ./backend/mvnw -f backend/pom.xml verify

      - name: Build de imagen Docker (valida el Dockerfile, sin push)
        run: docker build -t monitoreofletx:ci .

      - name: Logs de PostgreSQL de test (diagnostico)
        if: always()
        run: docker compose -f docker-compose.test.yml logs

      - name: Apagar PostgreSQL de test
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
